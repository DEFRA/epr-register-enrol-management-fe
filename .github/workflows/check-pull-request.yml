name: Check Pull Request

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Test code and Create Test Coverage Reports
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Security audit
        run: npm run security-audit

      - run: |
          npm ci
          npm run build:frontend
          npm run format:check
          npm run lint
          npm test

      - name: Test Docker Image Build
        run: |
          set +e
          docker build --no-cache --tag epr-register-case-management-frontend-poc .
          exit $?

  test-e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for matching e2e test branch
        id: e2e-branch
        run: |
          BRANCH="${{ github.head_ref }}"
          if git ls-remote --heads https://github.com/DEFRA/epr-register-enrol-mgmt-tests.git "$BRANCH" | grep -q .; then
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Build management-fe docker image
        run: docker build -t defradigital/epr-register-enrol-management-fe:${{ github.sha }} .

      - name: Check for matching management-be branch
        id: be-branch
        run: |
          BRANCH="${{ github.head_ref }}"
          if git ls-remote --heads https://github.com/DEFRA/epr-register-enrol-management-be.git "$BRANCH" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout and build matching management-be
        if: steps.be-branch.outputs.exists == 'true'
        id: build-be
        run: |
          git clone --branch ${{ github.head_ref }} --depth 1 https://github.com/DEFRA/epr-register-enrol-management-be.git _be
          cd _be
          SHA=$(git rev-parse --short HEAD)
          docker build -t defradigital/epr-register-enrol-management-be:$SHA .
          echo "tag=$SHA" >> "$GITHUB_OUTPUT"

      - name: Run e2e tests on ${{ steps.e2e-branch.outputs.ref }}
        uses: DEFRA/epr-register-enrol-mgmt-tests/run-journey-tests@main
        with:
          management-fe: ${{ github.sha }}
          management-be: ${{ steps.build-be.outputs.tag }}
          branch: ${{ steps.e2e-branch.outputs.ref }}

