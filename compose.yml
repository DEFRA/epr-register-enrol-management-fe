version: '3.4'
services:
  floci:
    image: hectorvent/floci:latest-aws
    ports:
      - '4566:4566'
    env_file:
      - 'compose/aws.env'
    environment:
      FLOCI_DEFAULT_REGION: eu-west-2
    volumes:
      - ./compose/floci/start.d:/etc/floci/init/start.d:ro
    networks:
      - cdp-tenant

  redis:
    image: redis:7.2.3-alpine3.18
    ports:
      - '6379:6379'
    networks:
      - cdp-tenant

  mongodb:
    image: mongo:7.0.28
    networks:
      - cdp-tenant
    ports:
      - '27017:27017'
    volumes:
      - ./compose/mongo:/docker-entrypoint-initdb.d:ro
      - mongodb-data:/data
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.hello().ok"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  ################################################################################

  case-management-frontend:
    build:
      context: ./
      target: development
    container_name: case-management-frontend
    ports:
      - '3000:3000'
    links:
      - 'floci:floci'
      - 'redis:redis'
      - 'case-management-backend:case-management-backend'
    depends_on:
      floci:
        condition: service_healthy
      redis:
        condition: service_started
      case-management-backend:
        condition: service_started
    env_file:
      - 'compose/aws.env'
    environment:
      PORT: 3000
      # Local docker compose runs the dev profile: stub auth, placeholder
      # session cookie password, no Redis TLS. The hardening assertions in
      # src/config/config.js reject those defaults whenever NODE_ENV is
      # production, so keep this as development locally.
      NODE_ENV: development
      REDIS_HOST: redis
      LOG_FORMAT: pino-pretty
      SESSION_COOKIE_SECURE: false
      USE_SINGLE_INSTANCE_CACHE: true
      REDIS_TLS: false
      BACKEND_API_URL: http://case-management-backend:8085
    networks:
      - cdp-tenant

  case-management-backend:
    build: ../epr-register-case-management-backend-poc
    container_name: case-management-backend
    ports:
      - '8085:8085'
    links:
      - 'floci:floci'
      - 'mongodb:mongodb'
    depends_on:
      floci:
        condition: service_healthy
      mongodb:
        condition: service_started
    env_file:
      - 'compose/aws.env'
    environment:
      ASPNETCORE_URLS: http://+:8085
      Mongo__DatabaseUri: mongodb://mongodb:27017/
      Mongo__DatabaseName: epr-register-case-management
    networks:
      - cdp-tenant

################################################################################

volumes:
  mongodb-data:

networks:
  cdp-tenant:
    driver: bridge
